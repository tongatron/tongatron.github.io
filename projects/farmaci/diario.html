<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diario Assunzioni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&family=Chakra+Petch:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./app.css" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#1f8a70" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Diario Farmaci" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  </head>
  <body data-page="diario">
    <nav class="bottom-nav">
      <a class="nav-item nav-home" href="./index.html">Gestione</a>
      <a class="nav-item nav-armadietto" href="./armadietto.html">Armadietto</a>
      <a class="nav-item nav-terapia" href="./terapia.html">Terapia</a>
      <a class="nav-item nav-diario" href="./diario.html">Diario</a>
    </nav>

    <main class="app">
      <section class="hero">
        <h1>Diario Assunzioni</h1>
        <p>Segna giorno per giorno se il farmaco è stato assunto.</p>
      </section>

      <section class="section">
        <div class="calendar-toggle">
          <button
            id="toggle-calendar-btn"
            class="secondary btn-compact"
            type="button"
            aria-controls="calendar-wrap"
            aria-expanded="false"
          >
            Apri calendario
          </button>
        </div>
<div class="diary-view-toggle" role="group" aria-label="Seleziona vista diario">
  <button
    id="diary-view-standard-btn"
    type="button"
    class="secondary btn-compact diary-view-btn active"
    aria-pressed="true"
  >
    Standard
  </button>
  <button
    id="diary-view-checklist-btn"
    type="button"
    class="secondary btn-compact diary-view-btn"
    aria-pressed="false"
  >
    Check-list
  </button>
</div>
        <div id="calendar-wrap" class="calendar-card hidden">
          <div class="calendar-toolbar">
            <button id="calendar-prev" class="secondary btn-compact" type="button">Mese prec.</button>
            <div id="calendar-month-label" class="calendar-month"></div>
            <button id="calendar-next" class="secondary btn-compact" type="button">Mese succ.</button>
          </div>
          <div class="calendar-weekdays">
            <span>Lun</span>
            <span>Mar</span>
            <span>Mer</span>
            <span>Gio</span>
            <span>Ven</span>
            <span>Sab</span>
            <span>Dom</span>
          </div>
          <div id="diary-calendar" class="calendar-grid" aria-live="polite"></div>
        </div>
        <div class="subline">
          <div class="summary" id="daily-summary">Nessuna registrazione</div>
        </div>
        <div id="diary-list" class="cards" aria-live="polite"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
