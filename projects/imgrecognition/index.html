<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ImgRecognition</title>
  <meta name="description" content="OCR mobile progressivo su frame video in tempo reale.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="./icons/icon-512.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>ImgRecognition</h1>
        <p>OCR progressivo per testo in luce scarsa</p>
      </div>
      <span id="appVersion" class="version">v-</span>
    </header>

    <section class="camera-card">
      <video id="camera" autoplay playsinline muted></video>
      <canvas id="processedPreview"></canvas>
      <canvas id="workCanvas" class="hidden"></canvas>
    </section>

    <section class="controls">
      <label>
        Lingua
        <select id="language">
          <option value="ita" selected>Italiano</option>
          <option value="eng">English</option>
          <option value="ita+eng">Ita + Eng</option>
        </select>
      </label>

      <label>
        Intervallo OCR
        <input id="interval" type="range" min="700" max="3000" step="100" value="1400">
        <span id="intervalValue">1400 ms</span>
      </label>

      <label class="switch-row">
        <input id="lowLight" type="checkbox" checked>
        <span>Migliora luce scarsa</span>
      </label>

      <div class="button-row">
        <button id="startBtn" type="button" class="primary">Avvia</button>
        <button id="stopBtn" type="button">Stop</button>
        <button id="copyBtn" type="button">Copia testo</button>
        <button id="clearBtn" type="button">Pulisci</button>
        <button id="installBtn" type="button" hidden disabled>Installa app</button>
      </div>
    </section>

    <section class="status">
      <p id="statusLine">In attesa di avvio camera.</p>
      <p id="statsLine">Frame OCR: 0</p>
      <p id="pwaStatus">PWA inactive</p>
    </section>

    <section class="outputs">
      <article>
        <h2>OCR ultimo frame</h2>
        <pre id="liveText">-</pre>
      </article>
      <article>
        <h2>Testo ricostruito</h2>
        <pre id="stableText">-</pre>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="./app.js" defer></script>
</body>
</html>
