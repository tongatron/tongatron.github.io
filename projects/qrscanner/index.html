<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>QR Scanner Mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    :root {
      --ink: #12222f;
      --muted: #4d6776;
      --accent: #14b8a6;
      --accent-2: #fb7185;
      --accent-3: #f59e0b;
      --paper: #ffffff;
      --bg-a: #ecfeff;
      --bg-b: #fff7ed;
      --ok: #127750;
      --warn: #9f1239;
      --radius-xl: 24px;
      --radius-lg: 16px;
      --shadow: 0 24px 60px rgba(18, 34, 47, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      font-family: "Outfit", "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(900px 500px at 15% 0%, #dcfce7 0%, transparent 60%),
        radial-gradient(700px 500px at 100% 15%, #fecdd3 0%, transparent 58%),
        linear-gradient(150deg, var(--bg-a), var(--bg-b));
    }

    body {
      padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
      display: grid;
      place-items: center;
    }

    .app {
      width: min(100%, 460px);
      background: color-mix(in oklab, var(--paper) 95%, #ffffff);
      border: 1px solid rgba(18, 34, 47, 0.07);
      border-radius: var(--radius-xl);
      padding: 18px;
      box-shadow: var(--shadow);
      animation: enter-up 440ms ease-out both;
    }

    .head {
      display: grid;
      gap: 4px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.35;
    }

    .status {
      margin: 12px 0 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: rgba(20, 184, 166, 0.14);
      color: #0f766e;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 0 currentColor;
      animation: ping 1.5s infinite;
    }

    .viewer {
      margin-top: 14px;
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #d8e4ec;
      aspect-ratio: 3 / 4;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .frame {
      position: absolute;
      inset: 14% 10%;
      border-radius: 20px;
      background:
        linear-gradient(transparent calc(50% - 1px), rgba(20, 184, 166, 0.55) 50%, transparent calc(50% + 1px));
      animation: scan-line 2.4s ease-in-out infinite;
      pointer-events: none;
    }

    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 20px;
      border: 2px solid rgba(255, 255, 255, 0.8);
      box-shadow: inset 0 0 0 1px rgba(20, 184, 166, 0.6);
    }

    .frame::after {
      border-color: transparent;
      background:
        linear-gradient(var(--accent), var(--accent)) top left / 22px 3px no-repeat,
        linear-gradient(var(--accent), var(--accent)) top left / 3px 22px no-repeat,
        linear-gradient(var(--accent), var(--accent)) top right / 22px 3px no-repeat,
        linear-gradient(var(--accent), var(--accent)) top right / 3px 22px no-repeat,
        linear-gradient(var(--accent), var(--accent)) bottom left / 22px 3px no-repeat,
        linear-gradient(var(--accent), var(--accent)) bottom left / 3px 22px no-repeat,
        linear-gradient(var(--accent), var(--accent)) bottom right / 22px 3px no-repeat,
        linear-gradient(var(--accent), var(--accent)) bottom right / 3px 22px no-repeat;
      animation: pulse-frame 2.2s infinite;
    }

    .controls {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 140ms ease, filter 140ms ease, opacity 140ms ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(120deg, var(--accent), #0ea5e9);
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(20, 184, 166, 0.28);
    }

    .btn-secondary {
      background: rgba(18, 34, 47, 0.08);
      color: var(--ink);
    }

    .btn-accent {
      background: linear-gradient(120deg, var(--accent-2), var(--accent-3));
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(251, 113, 133, 0.25);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: saturate(0.7);
    }

    .result {
      margin-top: 14px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(18, 34, 47, 0.08);
      background: #f8fafc;
      padding: 12px;
      display: none;
      animation: enter-up 260ms ease-out both;
    }

    .result.visible {
      display: block;
    }

    .label {
      margin: 0 0 8px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .value {
      margin: 0;
      font-family: "Space Mono", ui-monospace, Menlo, monospace;
      font-size: 0.88rem;
      line-height: 1.4;
      word-break: break-word;
      color: var(--ink);
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hint {
      margin: 12px 2px 0;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.35;
    }

    @keyframes enter-up {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes ping {
      0% {
        box-shadow: 0 0 0 0 currentColor;
      }
      90% {
        box-shadow: 0 0 0 8px transparent;
      }
      100% {
        box-shadow: 0 0 0 0 transparent;
      }
    }

    @keyframes pulse-frame {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.55;
      }
    }

    @keyframes scan-line {
      0% {
        background-position-y: 18%;
      }
      50% {
        background-position-y: 82%;
      }
      100% {
        background-position-y: 18%;
      }
    }

    @media (max-width: 360px) {
      .app {
        padding: 14px;
      }

      .btn {
        font-size: 0.9rem;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="head">
      <h1>Scanner QR Mobile</h1>
      <p class="subtitle">Inquadra un QR code. La scansione si ferma automaticamente quando trova un risultato.</p>
      <div class="status" id="status">Pronto ad avviare la fotocamera</div>
    </div>

    <section class="viewer">
      <video id="video" playsinline muted></video>
      <div class="frame" aria-hidden="true"></div>
    </section>

    <div class="controls">
      <button class="btn btn-primary" id="startBtn" type="button">Avvia scanner</button>
      <button class="btn btn-secondary" id="stopBtn" type="button" disabled>Ferma</button>
      <button class="btn btn-secondary" id="rescanBtn" type="button" disabled>Riscansiona</button>
      <button class="btn btn-accent" id="torchBtn" type="button" disabled>Torcia</button>
    </div>

    <section class="result" id="resultBox" aria-live="polite">
      <p class="label">Risultato</p>
      <p class="value" id="resultValue">-</p>
      <div class="actions">
        <button class="btn btn-secondary" id="openBtn" type="button" disabled>Apri link</button>
        <button class="btn btn-secondary" id="copyBtn" type="button" disabled>Copia testo</button>
      </div>
    </section>

    <p class="hint">Suggerimento: su iPhone/Android usa HTTPS (o localhost) per accedere alla fotocamera dal browser.</p>
  </main>

  <script>
    const els = {
      video: document.getElementById("video"),
      status: document.getElementById("status"),
      startBtn: document.getElementById("startBtn"),
      stopBtn: document.getElementById("stopBtn"),
      rescanBtn: document.getElementById("rescanBtn"),
      torchBtn: document.getElementById("torchBtn"),
      resultBox: document.getElementById("resultBox"),
      resultValue: document.getElementById("resultValue"),
      openBtn: document.getElementById("openBtn"),
      copyBtn: document.getElementById("copyBtn")
    };

    const scratchCanvas = document.createElement("canvas");
    const scratchCtx = scratchCanvas.getContext("2d", { willReadFrequently: true });

    let mediaStream = null;
    let detector = null;
    let isScanning = false;
    let scanPaused = false;
    let lastScanAt = 0;
    let torchEnabled = false;

    function setStatus(message, type = "ok") {
      els.status.textContent = message;
      if (type === "warn") {
        els.status.style.background = "rgba(190, 24, 93, 0.12)";
        els.status.style.color = "var(--warn)";
      } else {
        els.status.style.background = "rgba(20, 184, 166, 0.14)";
        els.status.style.color = "var(--ok)";
      }
    }

    function isProbablyUrl(text) {
      try {
        const value = new URL(text);
        return value.protocol === "https:" || value.protocol === "http:";
      } catch {
        return false;
      }
    }

    function showResult(value) {
      els.resultValue.textContent = value;
      els.resultBox.classList.add("visible");
      els.copyBtn.disabled = false;
      els.openBtn.disabled = !isProbablyUrl(value);
      els.rescanBtn.disabled = false;
    }

    function clearResult() {
      els.resultValue.textContent = "-";
      els.resultBox.classList.remove("visible");
      els.copyBtn.disabled = true;
      els.openBtn.disabled = true;
      els.rescanBtn.disabled = true;
    }

    async function setTorchState(enabled) {
      if (!mediaStream) {
        return;
      }
      const [track] = mediaStream.getVideoTracks();
      if (!track) {
        return;
      }
      try {
        await track.applyConstraints({
          advanced: [{ torch: enabled }]
        });
        torchEnabled = enabled;
        els.torchBtn.textContent = enabled ? "Torcia ON" : "Torcia";
      } catch {
        setStatus("Torcia non supportata da questo dispositivo/browser.", "warn");
      }
    }

    function getTorchSupport() {
      if (!mediaStream) {
        return false;
      }
      const [track] = mediaStream.getVideoTracks();
      const capabilities = track && track.getCapabilities ? track.getCapabilities() : {};
      return Boolean(capabilities.torch);
    }

    async function detectWithBarcodeDetector() {
      if (!detector) {
        return null;
      }
      const barcodes = await detector.detect(els.video);
      if (!barcodes.length) {
        return null;
      }
      return barcodes[0].rawValue || null;
    }

    function detectWithJsQr() {
      if (!scratchCtx || typeof window.jsQR !== "function") {
        return null;
      }
      const width = els.video.videoWidth;
      const height = els.video.videoHeight;
      if (!width || !height) {
        return null;
      }
      scratchCanvas.width = width;
      scratchCanvas.height = height;
      scratchCtx.drawImage(els.video, 0, 0, width, height);
      const imageData = scratchCtx.getImageData(0, 0, width, height);
      const result = window.jsQR(imageData.data, width, height, { inversionAttempts: "dontInvert" });
      return result ? result.data : null;
    }

    function onQrDetected(text) {
      scanPaused = true;
      showResult(text);
      setStatus("QR letto con successo.");
      if (navigator.vibrate) {
        navigator.vibrate(80);
      }
    }

    async function scanLoop(timestamp) {
      if (!isScanning) {
        return;
      }

      if (!scanPaused && timestamp - lastScanAt > 220) {
        lastScanAt = timestamp;
        try {
          const value = detector ? await detectWithBarcodeDetector() : detectWithJsQr();
          if (value) {
            onQrDetected(value);
          }
        } catch {
          const fallback = detectWithJsQr();
          if (fallback) {
            onQrDetected(fallback);
          }
        }
      }

      requestAnimationFrame(scanLoop);
    }

    async function startScanner() {
      const localHostnames = ["localhost", "127.0.0.1"];
      if (!window.isSecureContext && !localHostnames.includes(window.location.hostname)) {
        setStatus("Serve HTTPS o localhost per usare la fotocamera.", "warn");
        return;
      }
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus("Browser non compatibile con getUserMedia.", "warn");
        return;
      }

      clearResult();
      scanPaused = false;

      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
      } catch (error) {
        setStatus("Permesso fotocamera negato o non disponibile.", "warn");
        return;
      }

      els.video.srcObject = mediaStream;
      await els.video.play();
      isScanning = true;
      lastScanAt = 0;

      if ("BarcodeDetector" in window) {
        try {
          detector = new BarcodeDetector({ formats: ["qr_code"] });
        } catch {
          detector = null;
        }
      }

      if (!detector && typeof window.jsQR !== "function") {
        setStatus("Decoder QR non disponibile (BarcodeDetector/jsQR assenti).", "warn");
      } else if (detector) {
        setStatus("Scanner attivo con BarcodeDetector.");
      } else {
        setStatus("Scanner attivo con fallback jsQR.");
      }

      const torchSupported = getTorchSupport();
      els.torchBtn.disabled = !torchSupported;
      els.torchBtn.textContent = "Torcia";
      torchEnabled = false;

      els.startBtn.disabled = true;
      els.stopBtn.disabled = false;
      els.rescanBtn.disabled = true;
      requestAnimationFrame(scanLoop);
    }

    function stopScanner() {
      isScanning = false;
      scanPaused = false;
      detector = null;
      torchEnabled = false;
      els.torchBtn.textContent = "Torcia";
      els.torchBtn.disabled = true;

      if (els.video.srcObject) {
        const tracks = els.video.srcObject.getTracks();
        tracks.forEach((track) => track.stop());
      }

      els.video.srcObject = null;
      mediaStream = null;
      els.startBtn.disabled = false;
      els.stopBtn.disabled = true;
      els.rescanBtn.disabled = true;
      setStatus("Scanner fermato.");
    }

    els.startBtn.addEventListener("click", async () => {
      await startScanner();
    });

    els.stopBtn.addEventListener("click", () => {
      stopScanner();
    });

    els.rescanBtn.addEventListener("click", () => {
      if (!isScanning) {
        return;
      }
      scanPaused = false;
      clearResult();
      setStatus("Ricerca di un nuovo QR in corso...");
    });

    els.openBtn.addEventListener("click", () => {
      const value = els.resultValue.textContent || "";
      if (isProbablyUrl(value)) {
        window.open(value, "_blank", "noopener,noreferrer");
      }
    });

    els.copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(els.resultValue.textContent || "");
        setStatus("Testo copiato negli appunti.");
      } catch {
        setStatus("Copia non riuscita: permesso clipboard mancante.", "warn");
      }
    });

    els.torchBtn.addEventListener("click", async () => {
      await setTorchState(!torchEnabled);
    });

    window.addEventListener("beforeunload", stopScanner);
  </script>
</body>
</html>
