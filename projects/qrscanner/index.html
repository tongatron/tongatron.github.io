<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#14b8a6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>QR Scanner Mobile</title>
  <link rel="manifest" href="./manifest.webmanifest?v=1.3.0">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./style.css?v=1.3.0">
  <script defer src="./vendor/jsQR.min.js?v=1.3.0"></script>
  <script defer src="./app.js?v=1.3.0"></script>
</head>
<body>
  <main class="app">
    <div class="head">
      <h1>Scanner QR Mobile</h1>
      <div class="status" id="status">Pronto ad avviare la fotocamera</div>
    </div>

    <section class="viewer">
      <video id="video" playsinline muted></video>
      <div class="frame" aria-hidden="true"></div>
    </section>

    <div class="controls">
      <button class="btn btn-primary" id="startBtn" type="button">Avvia scanner</button>
      <button class="btn btn-secondary" id="stopBtn" type="button" disabled>Ferma</button>
      <button class="btn btn-secondary" id="rescanBtn" type="button" disabled>Nuova scansione</button>
      <button class="btn btn-accent" id="torchBtn" type="button" disabled>Torcia</button>
    </div>

    <section class="result" id="resultBox" aria-live="polite">
      <p class="label">Link/Testo trovato</p>
      <p class="value" id="resultValue">-</p>
      <p class="result-note">La camera è stata fermata automaticamente.</p>
      <div class="actions">
        <button class="btn btn-secondary" id="openBtn" type="button" disabled>Apri link</button>
        <button class="btn btn-secondary" id="copyBtn" type="button" disabled>Copia testo</button>
      </div>
    </section>

    <p class="hint">Per smartphone usa HTTPS (o localhost), necessario per accedere alla fotocamera dal browser.</p>
    <p class="version" id="appVersion" aria-label="Versione applicazione">v-</p>
  </main>
</body>
</html>
