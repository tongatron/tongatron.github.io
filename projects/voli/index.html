<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>voli da Torino</title>
    <meta name="theme-color" content="#0d5c63" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Voli TRN" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./assets/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/icon-192.png" />
    <link rel="apple-touch-icon" href="./assets/icon-192.png" />
    <script>
      (function ensureTrailingSlashForProjectPages() {
        var path = window.location.pathname;
        var lastSegment = path.split("/").pop();
        var looksLikeFile = lastSegment.indexOf(".") !== -1;

        if (path !== "/" && !path.endsWith("/") && !looksLikeFile) {
          window.location.replace(path + "/" + window.location.search + window.location.hash);
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260307-8" />
  </head>
  <body>
    <main class="shell">
      <section class="panel hero">
        <p class="eyebrow">Ryanair Fare Finder</p>
        <h1>voli da Torino</h1>
        <p>
          La ricerca usa le API pubbliche Ryanair e mostra il prezzo totale andata+ritorno
          dalle rotte Ryanair disponibili in partenza da Torino.
        </p>
      </section>

      <section class="panel controls">
        <form id="search-form" class="grid">
          <label>
            Aeroporto destinazione
            <select id="airport-filter">
              <option value="all">Tutti gli aeroporti raggiungibili</option>
            </select>
          </label>

          <label>
            Mesi da analizzare
            <input type="number" id="months" min="1" max="12" value="3" required />
          </label>

          <label>
            Durata target (giorni)
            <input type="number" id="target-stay" min="1" max="30" value="5" required />
          </label>

          <label>
            Tolleranza (± giorni)
            <input type="number" id="stay-tolerance" min="0" max="7" value="1" required />
          </label>

          <label>
            Spesa massima A/R (€)
            <input type="number" id="max-total-price" min="1" max="2000" step="1" value="70" required />
          </label>

          <div class="view-mode-toggle" role="group" aria-label="Visualizzazione risultati">
            <span class="view-mode-label">Visualizza Lista/Schede</span>
            <span class="view-mode-row" role="radiogroup" aria-label="Visualizzazione risultati">
              <label class="view-mode-option">
                <input type="radio" name="view-mode" value="list" checked />
                <span>Lista</span>
              </label>
              <label class="view-mode-option">
                <input type="radio" name="view-mode" value="cards" />
                <span>Schede</span>
              </label>
            </span>
          </div>

          <button type="submit" id="search-btn">Cerca voli</button>
        </form>
        <p id="meta" class="meta"></p>
      </section>

      <section class="panel results">
        <div class="results-head">
          <h2>Risultati ordinati per data</h2>
          <p id="status">Pronto.</p>
        </div>
        <div id="list-view" class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Partenza</th>
                <th>Ritorno</th>
                <th>Destinazione</th>
                <th>Durata</th>
                <th>Prezzo totale</th>
              </tr>
            </thead>
            <tbody id="results-body"></tbody>
          </table>
        </div>
        <div id="cards-view" class="cards-wrap hidden"></div>
      </section>
    </main>

    <script src="./app.js?v=20260307-9" type="module"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function registerServiceWorker() {
          navigator.serviceWorker.register("./service-worker.js").catch(function (error) {
            console.warn("Service worker non registrato:", error);
          });
        });
      }
    </script>
  </body>
</html>
