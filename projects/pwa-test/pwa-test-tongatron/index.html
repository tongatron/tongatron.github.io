<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2255CC" />
  <meta name="description" content="App di test per Bubblewrap TWA" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>PWA Test App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #2255CC;
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header .logo {
      width: 36px;
      height: 36px;
      background: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p  { font-size: 0.75rem; opacity: 0.8; }

    main {
      flex: 1;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7280;
      margin-bottom: 0.75rem;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.5rem 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 0.9rem;
    }
    .status-row:last-child { border-bottom: none; }
    .status-row .label { flex: 1; color: #374151; }
    .badge {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 99px;
      font-weight: 600;
    }
    .badge.ok  { background: #dcfce7; color: #166534; }
    .badge.ko  { background: #fee2e2; color: #991b1b; }
    .badge.info { background: #dbeafe; color: #1e40af; }

    .counter-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .counter-val {
      font-size: 3rem;
      font-weight: 700;
      color: #2255CC;
      line-height: 1;
    }
    .btn-group { display: flex; gap: 8px; }
    button {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }
    button:active { transform: scale(0.95); opacity: 0.85; }
    .btn-plus  { background: #2255CC; color: white; }
    .btn-minus { background: #e5e7eb; color: #374151; }
    .btn-reset { background: #fee2e2; color: #991b1b; font-size: 0.8rem; padding: 0.4rem 0.9rem; }

    .device-info { font-size: 0.85rem; color: #4b5563; line-height: 1.8; }

    #notify-btn {
      width: 100%;
      background: #2255CC;
      color: white;
      padding: 0.75rem;
      border-radius: 12px;
      font-size: 0.9rem;
    }
    #notify-btn.granted { background: #16a34a; }
    #notify-btn.denied  { background: #9ca3af; cursor: not-allowed; }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.75rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🚀</div>
  <div>
    <h1>PWA Test App</h1>
    <p>Progetto di test Bubblewrap / TWA</p>
  </div>
</header>

<main>

  <!-- Stato PWA -->
  <div class="card">
    <h2>Stato PWA</h2>
    <div class="status-row">
      <span class="label">Service Worker</span>
      <span class="badge" id="sw-status">controllo…</span>
    </div>
    <div class="status-row">
      <span class="label">Manifest</span>
      <span class="badge ok">✓ presente</span>
    </div>
    <div class="status-row">
      <span class="label">HTTPS / localhost</span>
      <span class="badge" id="https-status">controllo…</span>
    </div>
    <div class="status-row">
      <span class="label">Modalità display</span>
      <span class="badge info" id="display-mode">—</span>
    </div>
  </div>

  <!-- Contatore -->
  <div class="card">
    <h2>Contatore (test interattività)</h2>
    <div class="counter-wrap">
      <span class="counter-val" id="count">0</span>
      <div>
        <div class="btn-group">
          <button class="btn-minus" onclick="add(-1)">−</button>
          <button class="btn-plus"  onclick="add(1)">+</button>
        </div>
        <div style="margin-top:8px; text-align:right;">
          <button class="btn-reset" onclick="reset()">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Info dispositivo -->
  <div class="card">
    <h2>Info dispositivo</h2>
    <div class="device-info" id="device-info">Caricamento…</div>
  </div>

  <!-- Notifiche -->
  <div class="card">
    <h2>Notifiche push (test permesso)</h2>
    <button id="notify-btn" onclick="requestNotify()">Richiedi permesso notifiche</button>
    <p id="notify-msg" style="font-size:0.8rem;color:#6b7280;margin-top:0.6rem;"></p>
  </div>

</main>

<footer>pwa-test v1.0 — pronto per Bubblewrap</footer>

<script>
  // --- Contatore ---
  let count = 0;
  function add(n) { count += n; document.getElementById('count').textContent = count; }
  function reset() { count = 0; document.getElementById('count').textContent = 0; }

  // --- Service Worker ---
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => setBadge('sw-status', 'ok', '✓ attivo'))
      .catch(() => setBadge('sw-status', 'ko', '✗ errore'));
  } else {
    setBadge('sw-status', 'ko', '✗ non supportato');
  }

  // --- HTTPS ---
  const secure = location.protocol === 'https:' || location.hostname === 'localhost';
  setBadge('https-status', secure ? 'ok' : 'ko', secure ? '✓ sicuro' : '✗ non sicuro');

  // --- Display mode ---
  const modes = ['fullscreen','standalone','minimal-ui','browser'];
  const mode = modes.find(m => window.matchMedia('(display-mode:'+m+')').matches) || 'browser';
  const el = document.getElementById('display-mode');
  el.textContent = mode;
  if (mode === 'standalone' || mode === 'fullscreen') el.className = 'badge ok';

  // --- Device info ---
  document.getElementById('device-info').innerHTML =
    `<b>User Agent:</b> ${navigator.userAgent.split(')')[0].split('(')[1] || '—'}<br>
     <b>Schermo:</b> ${screen.width}×${screen.height} @ ${window.devicePixelRatio}x<br>
     <b>Online:</b> ${navigator.onLine ? 'sì' : 'no'}<br>
     <b>Lingua:</b> ${navigator.language}<br>
     <b>Platform:</b> ${navigator.platform || '—'}`;

  // --- Notifiche ---
  function requestNotify() {
    if (!('Notification' in window)) {
      document.getElementById('notify-msg').textContent = 'Notifiche non supportate su questo dispositivo.';
      return;
    }
    Notification.requestPermission().then(p => {
      const btn = document.getElementById('notify-btn');
      if (p === 'granted') {
        btn.textContent = '✓ Permesso concesso';
        btn.className = 'granted';
        document.getElementById('notify-msg').textContent = 'Notifiche abilitate!';
        new Notification('PWA Test', { body: 'Le notifiche funzionano correttamente 🎉', icon: 'icons/icon-192.png' });
      } else {
        btn.textContent = '✗ Permesso negato';
        btn.className = 'denied';
        document.getElementById('notify-msg').textContent = 'Permesso negato dall\'utente.';
      }
    });
  }

  function setBadge(id, type, text) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'badge ' + type;
  }
</script>
</body>
</html>
