<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test Form Contatto — Tongatron</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .badge-test { background: #ff9800; font-size: 11px; vertical-align: middle; }
    #status-msg { display: none; }
    #submit-btn .spinner { display: none; width: 16px; height: 16px; }
    #submit-btn.loading .spinner { display: inline-block; }
    #submit-btn.loading .label { display: none; }
  </style>
</head>
<body>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">

      <div class="text-center mb-4">
        <a href="/" class="text-decoration-none text-secondary small">← Torna al sito</a>
        <h1 class="h3 mt-2 fw-bold">Form di contatto
          <span class="badge badge-test rounded-pill ms-2">TEST</span>
        </h1>
        <p class="text-muted small">Questo form invia una mail reale tramite il server Raspi.</p>
      </div>

      <div class="card p-4 p-md-5">

        <div id="status-msg" class="alert mb-4" role="alert"></div>

        <form id="contact-form" novalidate>
          <div class="mb-3">
            <label for="name" class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="name" placeholder="Il tuo nome" required>
            <div class="invalid-feedback">Inserisci il tuo nome.</div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
            <input type="email" class="form-control" id="email" placeholder="tua@email.com" required>
            <div class="invalid-feedback">Inserisci un'email valida.</div>
          </div>

          <div class="mb-3">
            <label for="subject" class="form-label fw-semibold">Oggetto</label>
            <input type="text" class="form-control" id="subject" placeholder="(opzionale)">
          </div>

          <div class="mb-4">
            <label for="message" class="form-label fw-semibold">Messaggio <span class="text-danger">*</span></label>
            <textarea class="form-control" id="message" rows="5" placeholder="Scrivi qui..." required></textarea>
            <div class="invalid-feedback">Inserisci un messaggio.</div>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-success btn-lg" id="submit-btn">
              <span class="spinner-border spinner-border-sm spinner me-2" role="status"></span>
              <span class="label">Invia messaggio</span>
            </button>
          </div>
        </form>

      </div>

      <p class="text-center text-muted small mt-3">
        API: <code>https://chat.tongatron.org/api/send-mail</code>
      </p>

    </div>
  </div>
</div>

<script>
const API = 'https://api.tongatron.org/api/send-mail';

const form = document.getElementById('contact-form');
const btn  = document.getElementById('submit-btn');
const msg  = document.getElementById('status-msg');

function showMsg(text, type) {
  msg.className = `alert alert-${type} mb-4`;
  msg.textContent = text;
  msg.style.display = 'block';
  msg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  // Bootstrap validation
  form.classList.add('was-validated');
  if (!form.checkValidity()) return;

  btn.classList.add('loading');
  btn.disabled = true;
  msg.style.display = 'none';

  const payload = {
    name:    document.getElementById('name').value.trim(),
    email:   document.getElementById('email').value.trim(),
    subject: document.getElementById('subject').value.trim(),
    message: document.getElementById('message').value.trim(),
  };

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();

    if (data.ok) {
      showMsg('✅ Email inviata con successo! Controlla la casella ' + payload.email + ' (risposta) e giovanni.bindi@gmail.com.', 'success');
      form.reset();
      form.classList.remove('was-validated');
    } else {
      showMsg('❌ ' + (data.error || 'Errore sconosciuto'), 'danger');
    }
  } catch (err) {
    showMsg('❌ Impossibile raggiungere il server. Verifica che il Raspi sia online.', 'danger');
    console.error(err);
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
});
</script>
</html>
