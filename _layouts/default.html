<!doctype html>
<html lang="{{ page.lang | default: layout.lang | default: 'it' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.seo_title %}{{ page.seo_title }}{% elsif page.title %}{{ page.title }} | Tongatron{% else %}Tongatron{% endif %}</title>
  <meta name="description" content="{{ page.seo_description | default: page.excerpt | default: site.description | default: 'Progetti web, mobile, IoT e di fabbricazione digitale di Tongatron.' | strip_html | normalize_whitespace | escape }}">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <meta name="author" content="Tongatron">
  <meta property="og:locale" content="it_IT">
  <meta property="og:site_name" content="Tongatron">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if page.seo_title %}{{ page.seo_title }}{% elsif page.title %}{{ page.title }} | Tongatron{% else %}Tongatron{% endif %}">
  <meta property="og:description" content="{{ page.seo_description | default: page.excerpt | default: site.description | default: 'Progetti web, mobile, IoT e di fabbricazione digitale di Tongatron.' | strip_html | normalize_whitespace | escape }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ page.cover_image | default: '/img/robottino.jpg' | absolute_url }}">
  <meta property="og:image:alt" content="{{ page.title | default: 'Tongatron projects preview' }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.seo_title %}{{ page.seo_title }}{% elsif page.title %}{{ page.title }} | Tongatron{% else %}Tongatron{% endif %}">
  <meta name="twitter:description" content="{{ page.seo_description | default: page.excerpt | default: site.description | default: 'Progetti web, mobile, IoT e di fabbricazione digitale di Tongatron.' | strip_html | normalize_whitespace | escape }}">
  <meta name="twitter:image" content="{{ page.cover_image | default: '/img/robottino.jpg' | absolute_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root {
      --bg: #050505;
      --line: rgba(255, 255, 255, 0.10);
      --line-strong: rgba(255, 255, 255, 0.22);
      --text: #f5f5f5;
      --muted: #a5a5a5;
      --accent: #94dfff;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Titillium Web", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.07), transparent 24%),
        radial-gradient(circle at 84% 10%, rgba(255, 255, 255, 0.04), transparent 18%),
        linear-gradient(180deg, #020202 0%, #070707 42%, #111111 100%);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.52), transparent 80%);
      opacity: 0.55;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover,
    a:focus {
      color: var(--text);
    }

    .container-shell {
      position: relative;
      z-index: 1;
      width: min(1280px, 92vw);
      max-width: 1280px;
      margin-inline: auto;
    }

    .site-header {
      padding-top: 1.25rem;
    }

    .header-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--line-strong);
    }

    .brand-link {
      display: inline-flex;
      align-items: center;
      color: var(--text);
      text-decoration: none;
    }

    .brand-title {
      font-size: clamp(1.85rem, 3vw, 2.55rem);
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .brand-link .bi {
      font-size: clamp(1.85rem, 3vw, 2.55rem);
      margin-right: 0.55rem;
    }

    .header-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .hero {
      padding: 2rem 0 0.5rem;
    }

    .eyebrow {
      margin: 0 0 0.85rem;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .hero h1,
    .section-title {
      margin: 0;
      color: var(--text);
      font-size: clamp(2.2rem, 5vw, 4rem);
      letter-spacing: -0.05em;
      font-weight: 700;
    }

    .hero p,
    .section-intro,
    .project-card p,
    .project-meta,
    .project-content,
    .meta-list {
      color: var(--muted);
      line-height: 1.75;
      margin: 0;
    }

    main {
      padding-bottom: 2rem;
    }

    main > section.container-shell {
      margin-top: 2.25rem;
      padding-top: 2.1rem;
      border-top: 1px solid var(--line-strong);
    }

    .section-heading {
      margin-bottom: 1.15rem;
    }

    .btn-ghost,
    .button-row a,
    .project-link-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0.62rem 1.2rem;
      border-radius: 0.55rem;
      border: 2px solid rgba(255, 255, 255, 0.26);
      color: var(--text);
      background: rgba(255, 255, 255, 0.02);
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      transition:
        background-color 0.22s ease,
        border-color 0.22s ease,
        color 0.22s ease,
        transform 0.22s ease;
    }

    .btn-ghost:hover,
    .btn-ghost:focus,
    .button-row a:hover,
    .button-row a:focus,
    .project-link-arrow:hover,
    .project-link-arrow:focus {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.42);
      transform: translateY(-1px);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1rem;
      margin-top: 1.15rem;
    }

    .project-card,
    .project-panel,
    .project-content-panel {
      border: 1px solid var(--line);
      border-radius: 1.1rem;
      background: linear-gradient(180deg, rgba(20, 20, 20, 0.96), rgba(11, 11, 11, 0.96));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .project-card {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      overflow: hidden;
    }

    .project-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 0.85rem;
    }

    .project-icon {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0.45rem;
      background: rgba(255,255,255,0.04);
      flex-shrink: 0;
    }

    .tag-row,
    .meta-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .tag {
      --tag-border: rgba(255,255,255,0.18);
      --tag-bg: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 0.18rem 0.55rem;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--text);
      background: rgba(255,255,255,0.04);
      transition:
        transform 0.22s ease,
        background-color 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease,
        color 0.22s ease;
    }

    .tag:hover,
    .tag:focus {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.34);
      background: rgba(255,255,255,0.08);
    }

    .tag-filter-bar {
      display: grid;
      gap: 1rem;
      margin-top: 1.15rem;
    }

    .tag-filter-group {
      display: grid;
      gap: 0.45rem;
    }

    .tag-filter-title {
      margin: 0;
      font-size: 0.86rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .tag-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    button.tag,
    .tag-filter {
      appearance: none;
      cursor: pointer;
      font-family: inherit;
    }

    .tag-filter {
      position: relative;
      overflow: hidden;
    }

    .tag-filter::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(148, 223, 255, 0.28), transparent 62%);
      opacity: 0;
      transform: scale(0.72);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }

    .tag-filter:hover::after,
    .tag-filter:focus-visible::after,
    .tag-filter.is-active::after {
      opacity: 1;
      transform: scale(1);
    }

    .tag-filter.is-active {
      color: #021017;
      border-color: rgba(148, 223, 255, 0.9);
      background: linear-gradient(135deg, rgba(148, 223, 255, 0.96), rgba(214, 244, 255, 0.92));
      box-shadow: 0 0 0 1px rgba(148, 223, 255, 0.25), 0 10px 26px rgba(148, 223, 255, 0.2);
      transform: translateY(-1px) scale(1.03);
    }

    .tag-filter.is-active:hover,
    .tag-filter.is-active:focus {
      color: #021017;
      border-color: rgba(148, 223, 255, 0.9);
    }

    .tag-filter.is-dimmed {
      opacity: 0.55;
    }

    .project-tech-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.15rem;
      margin-bottom: 1rem;
    }

    .tag-tech {
      border-color: rgba(148, 223, 255, 0.18);
      background: rgba(148, 223, 255, 0.08);
    }

    .projects-results-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .projects-empty {
      display: none;
      padding: 1.1rem 1.2rem;
      margin-top: 1rem;
      border: 1px solid var(--line);
      border-radius: 1rem;
      background: rgba(255,255,255,0.03);
      color: var(--muted);
    }

    .project-card.is-hidden {
      display: none;
    }

    .project-card h3,
    .project-panel h1 {
      margin: 0 0 0.5rem;
      color: var(--text);
      line-height: 1.05;
      font-weight: 700;
    }

    .project-card h3 {
      font-size: 1.65rem;
    }

    .project-card p {
      margin-bottom: 1rem;
      flex-grow: 1;
    }

    .project-panel,
    .project-content-panel {
      padding: 1.25rem;
    }

    .project-hero {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 1rem;
      align-items: start;
    }

    .project-icon-large {
      width: 96px;
      height: 96px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 1rem;
      padding: 0.75rem;
      background: rgba(255,255,255,0.04);
    }

    .meta-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.8rem 1rem;
      list-style: none;
      padding: 0;
      margin: 1rem 0 0;
    }

    .meta-list strong {
      display: block;
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 0.15rem;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .project-content > :first-child {
      margin-top: 0;
    }

    .project-content h2,
    .project-content h3 {
      color: var(--text);
      margin-top: 1.5rem;
      margin-bottom: 0.6rem;
      letter-spacing: -0.03em;
    }

    .project-content p,
    .project-content ul {
      margin-bottom: 1rem;
    }

    .project-content li + li {
      margin-top: 0.35rem;
    }

    @media (max-width: 1199.98px) {
      .cards-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 767.98px) {
      .container-shell {
        width: min(1280px, 90vw);
      }

      .hero h1,
      .section-title {
        font-size: clamp(2rem, 11vw, 3.2rem);
      }

      .cards-grid,
      .meta-list {
        grid-template-columns: 1fr;
      }

      .header-topbar,
      .project-hero {
        align-items: flex-start;
      }

      .project-hero {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="container-shell site-header py-4">
    <div class="header-topbar">
      <a href="/index.html" class="brand-link">
        <i class="bi bi-balloon-fill" aria-hidden="true"></i>
        <span class="brand-title">tongatron</span>
      </a>
      <div class="header-actions">
        <a class="btn-ghost" href="/index.html">Torna alla home</a>
        <a class="btn-ghost" href="/projects/">Projects</a>
      </div>
    </div>
  </header>

  {{ content }}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
