<!doctype html>
<html lang="{{ page.lang | default: layout.lang | default: 'it' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.seo_title %}{{ page.seo_title }}{% elsif page.title %}{{ page.title }} | Tongatron{% else %}Tongatron{% endif %}</title>
  <meta name="description" content="{{ page.seo_description | default: page.excerpt | default: site.description | default: 'Progetti web, mobile, IoT e di fabbricazione digitale di Tongatron.' | strip_html | normalize_whitespace | escape }}">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <meta name="author" content="Tongatron">
  <meta property="og:locale" content="it_IT">
  <meta property="og:site_name" content="Tongatron">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if page.seo_title %}{{ page.seo_title }}{% elsif page.title %}{{ page.title }} | Tongatron{% else %}Tongatron{% endif %}">
  <meta property="og:description" content="{{ page.seo_description | default: page.excerpt | default: site.description | default: 'Progetti web, mobile, IoT e di fabbricazione digitale di Tongatron.' | strip_html | normalize_whitespace | escape }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ page.cover_image | default: '/img/robottino.jpg' | absolute_url }}">
  <meta property="og:image:alt" content="{{ page.title | default: 'Tongatron projects preview' }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.seo_title %}{{ page.seo_title }}{% elsif page.title %}{{ page.title }} | Tongatron{% else %}Tongatron{% endif %}">
  <meta name="twitter:description" content="{{ page.seo_description | default: page.excerpt | default: site.description | default: 'Progetti web, mobile, IoT e di fabbricazione digitale di Tongatron.' | strip_html | normalize_whitespace | escape }}">
  <meta name="twitter:image" content="{{ page.cover_image | default: '/img/robottino.jpg' | absolute_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root {
      --bg: #050505;
      --line: rgba(255, 255, 255, 0.10);
      --line-strong: rgba(255, 255, 255, 0.22);
      --text: #f5f5f5;
      --muted: #a5a5a5;
      --accent: #94dfff;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Titillium Web", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.07), transparent 24%),
        radial-gradient(circle at 84% 10%, rgba(255, 255, 255, 0.04), transparent 18%),
        linear-gradient(180deg, #020202 0%, #070707 42%, #111111 100%);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.52), transparent 80%);
      opacity: 0.55;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover,
    a:focus {
      color: var(--text);
    }

    .container-shell {
      position: relative;
      z-index: 1;
      width: min(1280px, 92vw);
      max-width: 1280px;
      margin-inline: auto;
    }

    .site-header {
      padding-top: 1.25rem;
    }

    .header-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--line-strong);
    }

    .brand-link {
      display: inline-flex;
      align-items: center;
      color: var(--text);
      text-decoration: none;
    }

    .brand-title {
      font-size: clamp(1.85rem, 3vw, 2.55rem);
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .brand-link .bi {
      font-size: clamp(1.85rem, 3vw, 2.55rem);
      margin-right: 0.55rem;
    }

    .hero {
      padding: 1.35rem 0 0.15rem;
    }

    .eyebrow {
      margin: 0 0 0.85rem;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .hero h1,
    .section-title {
      margin: 0;
      color: var(--text);
      font-size: clamp(2.2rem, 5vw, 4rem);
      letter-spacing: -0.05em;
      font-weight: 700;
    }

    .hero p,
    .section-intro,
    .project-card p,
    .project-meta,
    .project-content,
    .meta-list {
      color: var(--muted);
      line-height: 1.75;
      margin: 0;
    }

    .projects-hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.72fr);
      gap: 1rem;
      align-items: start;
    }

    .projects-hero-copy {
      min-width: 0;
      max-width: 820px;
    }

    .projects-hero-meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.5rem;
      justify-self: end;
      align-self: start;
      width: min(100%, 260px);
      margin-top: 0.15rem;
    }

    .projects-hero-stat {
      min-width: 148px;
      padding: 0.52rem 0.72rem 0.58rem;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.8rem;
      background: rgba(255,255,255,0.025);
    }

    .projects-hero-stat-value {
      display: block;
      color: var(--text);
      font-size: 1.15rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 0.14rem;
    }

    .projects-hero-stat-label {
      display: block;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.2;
    }

    main {
      padding-bottom: 2rem;
    }

    main > section.container-shell {
      margin-top: 1.8rem;
      padding-top: 1.6rem;
      border-top: 1px solid var(--line-strong);
    }

    .section-heading {
      margin-bottom: 1.15rem;
    }

    .btn-ghost,
    .button-row a:not(.project-link-arrow):not(.project-action-button) {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0.62rem 1.2rem;
      border-radius: 0.55rem;
      border: 2px solid rgba(255, 255, 255, 0.26);
      color: var(--text);
      background: rgba(255, 255, 255, 0.02);
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      transition:
        background-color 0.22s ease,
        border-color 0.22s ease,
        color 0.22s ease,
        transform 0.22s ease;
    }

    .project-link-arrow {
      display: inline-flex;
      gap: 0.45rem;
      color: var(--accent);
      min-height: 0;
      padding: 0;
      border-radius: 0;
      border: 0;
      background: transparent;
      justify-content: flex-start;
      align-items: center;
    }

    .project-link-arrow .bi {
      font-size: 1.02rem;
    }

    .button-row a:not(.project-link-arrow):not(.project-action-button) {
      gap: 0.45rem;
    }

    .button-row a:not(.project-link-arrow):not(.project-action-button) .bi {
      font-size: 0.98rem;
    }

    .project-action-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.42rem;
      min-height: 2.45rem;
      padding: 0.25rem 0.72rem 0.25rem 0.58rem;
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      background: #161b22;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1;
      white-space: nowrap;
      text-decoration: none;
      transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .project-action-button::before {
      font-family: bootstrap-icons;
      font-style: normal;
      font-weight: 400;
      font-size: 1.05em;
      line-height: 1;
      -webkit-font-smoothing: antialiased;
    }

    .project-action-open::before {
      content: "\f1c5";
    }

    .project-action-github::before {
      content: "\f3ed";
      font-size: 1.15em;
    }

    .btn-ghost:hover,
    .btn-ghost:focus,
    .button-row a:not(.project-link-arrow):not(.project-action-button):hover,
    .button-row a:not(.project-link-arrow):not(.project-action-button):focus {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.42);
      transform: translateY(-1px);
    }

    .project-action-button:hover,
    .project-action-button:focus {
      background: #21262d;
      border-color: rgba(255,255,255,0.5);
      color: #fff;
      transform: none;
    }

    .project-link-arrow:hover,
    .project-link-arrow:focus {
      background: transparent;
      border-color: transparent;
      color: #d8f1ff;
    }

    .project-link-square {
      min-width: 78px;
      font-size: 0.92rem;
      font-weight: 400;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
      margin-top: 1.15rem;
      align-items: start;
    }

    .project-card,
    .project-panel,
    .project-content-panel {
      border: 1px solid var(--line);
      border-radius: 1.1rem;
      background: linear-gradient(180deg, rgba(20, 20, 20, 0.96), rgba(11, 11, 11, 0.96));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .project-card {
      padding: 1rem;
      overflow: hidden;
      height: fit-content;
    }

    .project-card-cover {
      display: block;
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 0.9rem;
      margin-bottom: 1rem;
      background: rgba(255,255,255,0.03);
    }

    .project-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 0.85rem;
    }

    .project-icon {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0.45rem;
      background: rgba(255,255,255,0.04);
      flex-shrink: 0;
    }

    .tag-row,
    .meta-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .tag {
      --tag-border: rgba(255,255,255,0.18);
      --tag-bg: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 0.18rem 0.55rem;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--text);
      background: rgba(255,255,255,0.04);
      transition:
        transform 0.22s ease,
        background-color 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease,
        color 0.22s ease;
    }

    .tag:hover,
    .tag:focus {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.34);
      background: rgba(255,255,255,0.08);
    }

    .tag-filter-bar {
      display: grid;
      gap: 1rem;
      margin-top: 1.15rem;
    }

    .filter-toolbar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
      margin-top: 1.15rem;
    }

    .filter-menu {
      display: grid;
      gap: 0.45rem;
      position: relative;
      align-content: start;
    }

    .filter-dropdown {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 0.9rem;
      background: rgba(255, 255, 255, 0.02);
      overflow: visible;
    }

    .filter-dropdown summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      cursor: pointer;
      list-style: none;
      color: var(--text);
      font-weight: 600;
    }

    .filter-dropdown summary::-webkit-details-marker {
      display: none;
    }

    .filter-dropdown[open] {
      border-color: rgba(148, 223, 255, 0.36);
      box-shadow: 0 0 0 1px rgba(148, 223, 255, 0.12);
      z-index: 10;
    }

    .filter-options {
      display: grid;
      gap: 0.2rem;
      position: absolute;
      top: calc(100% + 0.35rem);
      left: 0;
      right: 0;
      z-index: 20;
      padding: 0.45rem;
      border: 1px solid rgba(148, 223, 255, 0.22);
      border-radius: 0.9rem;
      background: rgba(10, 10, 10, 0.98);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.34);
      max-height: 220px;
      overflow: auto;
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.55rem 0.65rem;
      border-radius: 0.65rem;
      color: var(--muted);
      cursor: pointer;
      transition: background-color 0.18s ease, color 0.18s ease;
    }

    .filter-option:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .filter-option input {
      accent-color: var(--accent);
      inline-size: 1rem;
      block-size: 1rem;
      margin: 0;
      flex-shrink: 0;
    }

    .tag-filter-group {
      display: grid;
      gap: 0.45rem;
    }

    .tag-filter-title {
      margin: 0;
      font-size: 0.86rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .tag-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    button.tag,
    .tag-filter {
      appearance: none;
      cursor: pointer;
      font-family: inherit;
    }

    .tag-filter {
      position: relative;
      overflow: hidden;
    }

    .tag-filter::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(148, 223, 255, 0.28), transparent 62%);
      opacity: 0;
      transform: scale(0.72);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }

    .tag-filter:hover::after,
    .tag-filter:focus-visible::after,
    .tag-filter.is-active::after {
      opacity: 1;
      transform: scale(1);
    }

    .tag-filter.is-active {
      color: #021017;
      border-color: rgba(148, 223, 255, 0.9);
      background: linear-gradient(135deg, rgba(148, 223, 255, 0.96), rgba(214, 244, 255, 0.92));
      box-shadow: 0 0 0 1px rgba(148, 223, 255, 0.25), 0 10px 26px rgba(148, 223, 255, 0.2);
      transform: translateY(-1px) scale(1.03);
    }

    .tag-filter.is-active:hover,
    .tag-filter.is-active:focus {
      color: #021017;
      border-color: rgba(148, 223, 255, 0.9);
    }

    .tag-filter.is-dimmed {
      opacity: 0.55;
    }

    .project-tech-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.15rem;
      margin-bottom: 1rem;
    }

    .tag-tech {
      border-color: rgba(148, 223, 255, 0.18);
      background: rgba(148, 223, 255, 0.08);
    }

    .projects-results-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .projects-meta-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.85rem;
      flex-wrap: wrap;
    }

    .active-filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .active-filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      border: 1px solid rgba(148, 223, 255, 0.34);
      border-radius: 999px;
      padding: 0.35rem 0.65rem;
      background: rgba(148, 223, 255, 0.12);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    .active-filter-chip .bi {
      font-size: 0.78rem;
      opacity: 0.85;
    }

    .projects-empty {
      display: none;
      padding: 1.1rem 1.2rem;
      margin-top: 1rem;
      border: 1px solid var(--line);
      border-radius: 1rem;
      background: rgba(255,255,255,0.03);
      color: var(--muted);
    }

    .projects-osi-badge {
      position: fixed;
      right: 1.2rem;
      bottom: 1.1rem;
      z-index: 2;
      pointer-events: none;
      opacity: 0.72;
    }

    .projects-osi-image {
      display: block;
      width: clamp(120px, 14vw, 200px);
      height: auto;
      filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.28));
    }

    .project-card.is-hidden {
      display: none;
    }

    .project-card h3,
    .project-panel h1 {
      margin: 0 0 0.5rem;
      color: var(--text);
      line-height: 1.05;
      font-weight: 700;
    }

    .project-card h3 {
      font-size: 1.65rem;
    }

    .project-card p {
      margin-bottom: 1rem;
    }

    .project-panel,
    .project-content-panel {
      padding: 1.25rem;
    }

    .project-hero {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 1rem;
      align-items: start;
    }

    .project-icon-large {
      width: 96px;
      height: 96px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 1rem;
      padding: 0.75rem;
      background: rgba(255,255,255,0.04);
    }

    .meta-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.8rem 1rem;
      list-style: none;
      padding: 0;
      margin: 1rem 0 0;
    }

    .meta-list strong {
      display: block;
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 0.15rem;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 0;
    }

    .project-content > :first-child {
      margin-top: 0;
    }

    .project-content h2,
    .project-content h3 {
      color: var(--text);
      margin-top: 1.5rem;
      margin-bottom: 0.6rem;
      letter-spacing: -0.03em;
    }

    .project-content p,
    .project-content ul {
      margin-bottom: 1rem;
    }

    .project-content li + li {
      margin-top: 0.35rem;
    }

    @media (max-width: 1199.98px) {
      .projects-hero-grid {
        grid-template-columns: minmax(0, 1fr) minmax(240px, 0.66fr);
      }

      .cards-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 767.98px) {
      .container-shell {
        width: min(1280px, 90vw);
      }

      .hero {
        padding: 1rem 0 0.1rem;
      }

      .hero h1,
      .section-title {
        font-size: clamp(2rem, 11vw, 3.2rem);
      }

      .projects-hero-grid {
        grid-template-columns: 1fr;
      }

      .projects-hero-meta {
        width: 100%;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.55rem;
        margin-top: 1rem;
        justify-self: stretch;
      }

      .projects-hero-stat {
        min-width: 0;
      }

      .filter-toolbar {
        grid-template-columns: 1fr;
      }

      .filter-options {
        position: static;
        margin-top: 0;
      }

      .cards-grid,
      .meta-list {
        grid-template-columns: 1fr;
      }

      .projects-results-meta,
      .projects-meta-actions,
      .active-filters {
        justify-content: flex-start;
      }

      .projects-osi-badge {
        right: 0.8rem;
        bottom: 0.8rem;
        opacity: 0.46;
      }

      .projects-osi-image {
        width: min(34vw, 148px);
      }

      .header-topbar,
      .project-hero {
        align-items: flex-start;
      }

      .project-hero {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="container-shell site-header py-4">
    <div class="header-topbar">
      <a href="/index.html" class="brand-link">
        <i class="bi bi-balloon-fill" aria-hidden="true"></i>
        <span class="brand-title">tongatron</span>
      </a>
    </div>
  </header>

  {{ content }}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
