<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#000"/>

  <!-- Top face -->
  <polygon points="50,8 84,26 50,44 16,26" fill="#fff"/>
  <!-- Left face -->
  <polygon points="16,26 50,44 50,86 16,68" fill="#d8d8d8"/>
  <!-- Right face -->
  <polygon points="50,44 84,26 84,68 50,86" fill="#b0b0b0"/>

  <!-- Cube edges -->
  <polyline points="50,8 16,26 16,68 50,86 84,68 84,26 50,8" fill="none" stroke="#000" stroke-width="1.2"/>
  <line x1="50" y1="44" x2="16" y2="26" stroke="#000" stroke-width="1.2"/>
  <line x1="50" y1="44" x2="84" y2="26" stroke="#000" stroke-width="1.2"/>
  <line x1="50" y1="44" x2="50" y2="86" stroke="#000" stroke-width="1.2"/>

  <!-- Top face: 5 pips -->
  <rect x="36" y="17" width="5" height="5" fill="#000"/>
  <rect x="59" y="17" width="5" height="5" fill="#000"/>
  <rect x="47" y="23" width="5" height="5" fill="#000"/>
  <rect x="36" y="30" width="5" height="5" fill="#000"/>
  <rect x="59" y="30" width="5" height="5" fill="#000"/>

  <!-- Left face: 4 pips -->
  <rect x="21" y="36" width="5" height="5" fill="#000"/>
  <rect x="38" y="45" width="5" height="5" fill="#000"/>
  <rect x="21" y="62" width="5" height="5" fill="#000"/>
  <rect x="38" y="70" width="5" height="5" fill="#000"/>

  <!-- Right face: 1 pip -->
  <rect x="63" y="52" width="6" height="6" fill="#000"/>
</svg>
