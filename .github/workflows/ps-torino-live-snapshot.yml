name: PS Torino Live Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  actions: write
  contents: write

concurrency:
  group: ps-torino-live-snapshot
  cancel-in-progress: false

jobs:
  update-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate live snapshot
        run: node projects/PS-Torino/scripts/scrape-ps-torino.js

      - name: Detect changes
        id: detect_changes
        run: |
          if git diff --quiet -- projects/PS-Torino/data/live-torino.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit snapshot
        if: steps.detect_changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/PS-Torino/data/live-torino.json
          git commit -m "chore(ps-torino): update live snapshot"
          git push
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-pages.yml/dispatches \
            -d '{"ref":"main"}'
