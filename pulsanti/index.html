<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Lab — tongatron</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=IBM+Plex+Mono:wght@400;600&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafafa;
    --panel: #fff;
    --border: #e3e3e3;
    --text: #111;
    --muted: #666;
    --accent: #ffcc00;
    --font-family: system-ui;
    --font-size: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-family);
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { margin: 0 0 14px; font-size: 18px; font-weight: 600; }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
  }
  .controls label {
    display: flex;
    flex-direction: column;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    gap: 4px;
  }
  .controls input[type="text"],
  .controls input[type="color"],
  .controls select {
    font: inherit;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    color: var(--text);
    font-size: 14px;
  }
  .controls input[type="color"] { padding: 2px; width: 44px; height: 32px; cursor: pointer; }
  #char-input { width: 44px; padding: 6px; text-align: center; font-size: 16px; }
  #font-select { max-width: 160px; }
  #size-input { width: 60px; }
  .seg {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .seg button {
    border: 0;
    background: #fff;
    padding: 6px 12px;
    cursor: pointer;
    font: inherit;
    font-size: 13px;
  }
  .seg button.active { background: #111; color: #fff; }

  /* Sezioni sfondo */
  .section { padding: 32px 24px; }
  .section h2 {
    margin: 0 0 18px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.7;
  }
  .dark  { background: #111; color: #eee; }
  .gray  { background: #777; color: #111; }
  .light { background: #fff; color: #111; }
  .custom { color: #111; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
  }
  .card {
    position: relative;
    padding: 18px 14px 14px;
    border-radius: 10px;
    background: transparent;
    border: transparent;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 110px;
  }
  .card-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.55;
    position: absolute;
    top: 8px;
    left: 12px;
  }
  .card-actions {
    margin-top: auto;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .copy-btn {
    font: inherit;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 5px;
    border: 1px solid currentColor;
    background: transparent;
    color: inherit;
    cursor: pointer;
    opacity: 0.7;
    transition: 0.15s;
  }
  .copy-btn:hover { opacity: 1; }
  .copy-btn.copied { background: var(--accent); color: #111; border-color: var(--accent); opacity: 1; }
  .badge-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    padding-top: 8px;
  }

  /* ===== BADGE BASE ===== */
  .site-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.2s;
    color: inherit;
  }

  /* MARK (generico) */
  .mark {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .mark-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--accent);
  }
  .mark-baloon svg {
    width: 14px;
    height: 14px;
  }
  .mark-char {
    font-size: 13px;
    line-height: 1;
    color: var(--accent);
    font-weight: 600;
  }

  /* ===== VARIANTI NERO (A) ===== */
  .A1 { color: #fff; }
  .A2 { border: 1px solid var(--accent); padding: 6px 10px; border-radius: 6px; }
  .A3 .mark { box-shadow: 0 0 8px rgba(255,204,0,0.8); }
  .A4 { background: #222; padding: 6px 10px; border-radius: 6px; }
  .A5 { background: var(--accent); color: #000; padding: 6px 12px; border-radius: 6px; font-weight: 600; }
  .A5 .mark { background: #000; }
  .A6 { letter-spacing: 1px; text-transform: uppercase; }
  .A7 { border-bottom: 2px solid var(--accent); padding-bottom: 2px; }
  .A8 .mark { transform: scale(1.3); }

  /* ===== VARIANTI SCURO (B) ===== */
  .B1 { color: #ddd; }
  .B2 { border: 1px solid var(--accent); padding: 6px 10px; border-radius: 6px; }
  .B3 .mark { box-shadow: 0 0 8px rgba(255,204,0,0.8); }
  .B4 { background: #222; padding: 6px 10px; border-radius: 6px; }
  .B5 { background: var(--accent); color: #111; padding: 6px 12px; border-radius: 6px; font-weight: 600; }
  .B5 .mark { background: #111; }
  .B6 { letter-spacing: 1px; text-transform: uppercase; }
  .B7 { border-bottom: 2px solid var(--accent); padding-bottom: 2px; }
  .B8 .mark { transform: scale(1.3); }

  /* ===== VARIANTI GRIGIO SCURO (C) ===== */
  .C1 { color: #fff; }
  .C2 { border: 1px solid var(--accent); padding: 6px 10px; border-radius: 6px; }
  .C3 .mark { box-shadow: 0 0 8px rgba(255,204,0,0.8); }
  .C4 { background: #666; padding: 6px 10px; border-radius: 6px; }
  .C5 { background: var(--accent); color: #000; padding: 6px 10px; border-radius: 6px; font-weight: 600; }
  .C5 .mark { background: #000; }
  .C6 { font-style: italic; }
  .C7 { border-bottom: 2px solid var(--accent); }
  .C8 .mark { opacity: 0.7; }

  /* ===== VARIANTI GRIGIO CHIARO (D) ===== */
  .D1 { color: #000; }
  .D2 { border: 1px solid #333; padding: 6px 10px; border-radius: 6px; }
  .D3 .mark { transform: scale(1.2); }
  .D4 { background: #bbb; border-radius: 20px; padding: 6px 12px; border: 1px solid #999; }
  .D5 { background: #111; color: var(--accent); padding: 6px 12px; border-radius: 6px; }
  .D6 { letter-spacing: 0.5px; }
  .D7 { border-bottom: 2px solid #333; }
  .D8 .mark { opacity: 0.8; }

  /* ===== VARIANTI BIANCO (E) ===== */
  .E1 { color: #222; }
  .E2 { border: 1px solid #333; padding: 6px 10px; border-radius: 6px; }
  .E3 .mark { transform: scale(1.2); }
  .E4 { background: #f5f5f5; border-radius: 20px; padding: 6px 12px; border: 1px solid #ddd; }
  .E5 { background: #111; color: var(--accent); padding: 6px 12px; border-radius: 6px; }
  .E6 { letter-spacing: 0.5px; }
  .E7 { border-bottom: 2px solid #333; }
  .E8 .mark { opacity: 0.8; }

  /* ===== VARIANTI CUSTOM (F) ===== */
  .F1 { color: #222; }
  .F2 { border: 1px solid #666; padding: 6px 10px; border-radius: 6px; }
  .F3 .mark { transform: scale(1.1); }
  .F4 { background: rgba(0,0,0,0.1); border-radius: 20px; padding: 6px 12px; border: 1px solid rgba(0,0,0,0.2); }
  .F5 { background: #111; color: var(--accent); padding: 6px 12px; border-radius: 6px; }
  .F6 { letter-spacing: 0.5px; }
  .F7 { border-bottom: 2px solid var(--accent); }
  .F8 .mark { opacity: 0.8; }
  .L8 .mark { box-shadow: 0 0 4px rgba(255,204,0,0.5); }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #111;
    color: #fff;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: 0.2s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
    <h1 style="margin:0;">Logo Lab — varianti badge tongatron</h1>
    <a href="svg-test.html" style="padding:6px 12px; background:#111; color:#fff; border-radius:6px; text-decoration:none; font-size:13px; font-weight:600;">SVG Tester →</a>
  </div>
  <div class="controls">
    <label>Testo
      <input type="text" id="text-input" value="tongatron.org">
    </label>
    <label>Forma
      <span class="seg" id="shape-seg">
        <button data-shape="dot" class="active">Dot</button>
        <button data-shape="baloon">Baloon</button>
        <button data-shape="char">Carattere</button>
      </span>
    </label>
    <label id="char-label" style="display:none;">Simbolo
      <input type="text" id="char-input" value="●" maxlength="2">
    </label>
    <label>Font
      <select id="font-select">
        <option value="system-ui">System (default)</option>
        <option value="'Courier Prime', monospace">Courier Prime</option>
        <option value="'Space Mono', monospace">Space Mono</option>
        <option value="'IBM Plex Mono', monospace">IBM Plex Mono</option>
        <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
        <option value="Georgia, serif">Georgia (serif)</option>
      </select>
    </label>
    <label>Dimensione
      <input type="number" id="size-input" value="14" min="10" max="24" step="1">
    </label>
    <label>Colore mark
      <input type="color" id="accent-input" value="#ffcc00">
    </label>
    <label>Sfondo custom
      <input type="text" id="custom-bg" placeholder="#hex o nome" value="#1e3a8a">
    </label>
  </div>
</header>

<!-- NERO -->
<div class="section" style="background:#000; color:#eee;">
  <h2>Nero</h2>
  <div class="grid" data-prefix="A"></div>
</div>

<!-- SCURO -->
<div class="section dark">
  <h2>Scuro</h2>
  <div class="grid" data-prefix="B"></div>
</div>

<!-- GRIGIO SCURO -->
<div class="section" style="background:#555; color:#eee;">
  <h2>Grigio scuro</h2>
  <div class="grid" data-prefix="C"></div>
</div>

<!-- GRIGIO CHIARO -->
<div class="section" style="background:#ddd; color:#111;">
  <h2>Grigio chiaro</h2>
  <div class="grid" data-prefix="D"></div>
</div>

<!-- BIANCO -->
<div class="section light">
  <h2>Bianco</h2>
  <div class="grid" data-prefix="E"></div>
</div>

<!-- CUSTOM -->
<div class="section custom" id="custom-section">
  <h2>Personalizzato</h2>
  <div class="grid" data-prefix="F"></div>
</div>

<div class="toast" id="toast">Copiato!</div>

<script>
  const VARIANTS = [1,2,3,4,5,6,7,8];
  const textInput = document.getElementById('text-input');
  const accentInput = document.getElementById('accent-input');
  const charInput = document.getElementById('char-input');
  const charLabel = document.getElementById('char-label');
  const customBg = document.getElementById('custom-bg');
  const customSection = document.getElementById('custom-section');
  const shapeSeg = document.getElementById('shape-seg');
  const fontSelect = document.getElementById('font-select');
  const sizeInput = document.getElementById('size-input');
  const toast = document.getElementById('toast');

  let state = {
    text: textInput.value,
    shape: 'dot',
    accent: accentInput.value,
    char: charInput.value,
    customBg: customBg.value,
    font: fontSelect.value,
    fontSize: parseInt(sizeInput.value),
  };

  function buildMarkHTML() {
    if (state.shape === 'dot') {
      return '<span class="mark mark-dot"></span>';
    } else if (state.shape === 'baloon') {
      return `<span class="mark mark-baloon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="var(--accent)" viewBox="0 0 16 16" aria-hidden="true"><path fill-rule="evenodd" d="M8.48 10.901C11.211 10.227 13 7.837 13 5A5 5 0 0 0 3 5c0 2.837 1.789 5.227 4.52 5.901l-.244.487a.25.25 0 1 0 .448.224l.04-.08c.009.17.024.315.051.45.068.344.208.622.448 1.102l.013.028c.212.422.182.85.05 1.246-.135.402-.366.751-.534 1.003a.25.25 0 0 0 .416.278l.004-.007c.166-.248.431-.646.588-1.115.16-.479.212-1.051-.076-1.629-.258-.515-.365-.732-.419-1.004a2 2 0 0 1-.037-.289l.008.017a.25.25 0 1 0 .448-.224zM4.352 3.356a4 4 0 0 1 3.15-2.325C7.774.997 8 1.224 8 1.5s-.226.496-.498.542c-.95.162-1.749.78-2.173 1.617a.6.6 0 0 1-.52.341c-.346 0-.599-.329-.457-.644"/></svg></span>`;
    } else if (state.shape === 'char') {
      return `<span class="mark mark-char">${escapeHTML(state.char)}</span>`;
    }
  }

  function buildBadgeHTML(prefix, n, { inline = false } = {}) {
    const cls = prefix + n;
    const styleAttr = inline
      ? ` style="--accent:${state.accent}; font-family:${state.font}; font-size:${state.fontSize}px"`
      : ` style="font-family:${state.font}; font-size:${state.fontSize}px"`;
    const markHTML = buildMarkHTML();
    return `<a class="site-badge ${cls}" href="https://${escapeAttr(state.text)}"${styleAttr}>${markHTML}${escapeHTML(state.text)}</a>`;
  }

  function escapeHTML(s){return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function escapeAttr(s){return escapeHTML(s);}

  function buildMarkdown(prefix, n) {
    let symbol;
    if (state.shape === 'baloon') symbol = '💬';
    else if (state.shape === 'char') symbol = state.char;
    else symbol = '●';
    return `${symbol} [${state.text}](https://${state.text})`;
  }

  function render() {
    document.documentElement.style.setProperty('--accent', state.accent);
    customSection.style.background = state.customBg || '#1e3a8a';

    document.querySelectorAll('.grid').forEach(grid => {
      const prefix = grid.dataset.prefix;
      grid.innerHTML = VARIANTS.map(n => `
        <div class="card">
          <span class="card-label">${prefix}${n}</span>
          <div class="badge-wrap">${buildBadgeHTML(prefix, n)}</div>
          <div class="card-actions">
            <button class="copy-btn" data-copy="html" data-prefix="${prefix}" data-n="${n}">Copia HTML</button>
            <button class="copy-btn" data-copy="md" data-prefix="${prefix}" data-n="${n}">Copia MD</button>
          </div>
        </div>
      `).join('');
    });
  }

  function copy(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      btn.textContent = '✓ Copiato';
      showToast();
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.textContent = btn.dataset.copy === 'html' ? 'Copia HTML' : 'Copia MD';
      }, 1400);
    });
  }
  let toastTimer;
  function showToast(){
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1200);
  }

  document.addEventListener('click', e => {
    const btn = e.target.closest('.copy-btn');
    if (!btn) return;
    const { copy: kind, prefix, n } = btn.dataset;
    const out = kind === 'html'
      ? buildBadgeHTML(prefix, +n, { inline: true })
      : buildMarkdown(prefix, +n);
    copy(out, btn);
  });

  textInput.addEventListener('input', e => { state.text = e.target.value || ' '; render(); });
  accentInput.addEventListener('input', e => { state.accent = e.target.value; render(); });
  charInput.addEventListener('input', e => { state.char = e.target.value || '●'; render(); });
  customBg.addEventListener('input', e => { state.customBg = e.target.value; render(); });
  fontSelect.addEventListener('change', e => { state.font = e.target.value; render(); });
  sizeInput.addEventListener('input', e => { state.fontSize = parseInt(e.target.value); render(); });
  shapeSeg.addEventListener('click', e => {
    const b = e.target.closest('button');
    if (!b) return;
    shapeSeg.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
    state.shape = b.dataset.shape;
    charLabel.style.display = state.shape === 'char' ? 'flex' : 'none';
    render();
  });

  render();
</script>
</body>
</html>
